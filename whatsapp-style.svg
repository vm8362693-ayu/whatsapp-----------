<svg width="300" height="300" viewBox="0 0 300 300" xmlns="http://www.w3.org/2000/svg">
  <circle cx="150" cy="150" r="140" stroke="#25D366" stroke-width="2" fill="none"/>

  <!-- Phone -->
  <rect x="110" y="90" width="80" height="120" rx="15" stroke="#25D366" fill="none" stroke-width="2"/>
  <circle cx="150" cy="190" r="5" fill="#25D366"/>

  <!-- Chat bubble -->
  <rect x="60" y="130" width="40" height="30" rx="8" stroke="#25D366" fill="none" stroke-width="2"/>

  <!-- Heart -->
  <path d="M210 120 
           C210 110, 230 110, 230 120 
           C230 140, 210 150, 210 150 
           C210 150, 190 140, 190 120 
           C190 110, 210 110, 210 120Z"
        stroke="#25D366" fill="none" stroke-width="2"/>

  <!-- Camera -->
  <rect x="180" y="170" width="40" height="25" rx="5" stroke="#25D366" fill="none" stroke-width="2"/>
  <circle cx="200" cy="182" r="6" stroke="#25D366" fill="none" stroke-width="2"/>

  <!-- Star -->
  <polygon points="80,80 85,95 100,95 88,105 93,120 80,110 67,120 72,105 60,95 75,95"
           stroke="#25D366" fill="none" stroke-width="2"/>

</svg>